<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Macgie</title>
  <link rel="icon" href="/assets/img/app-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Inter:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root { --cream: #f2efec; --ink: #070707; --gray: #6e6c6a; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100dvh;
      display: grid; place-items: center;
      background: var(--cream); color: var(--ink);
      font-family: "Inter", system-ui, sans-serif;
      text-align: center; padding: 24px;
    }
    .code { font-family: "Poppins", sans-serif; font-weight: 700; font-size: clamp(72px, 18vw, 160px); line-height: 1; letter-spacing: -0.05em; }
    h1 { font-family: "Poppins", sans-serif; font-weight: 700; font-size: clamp(22px, 4vw, 32px); margin: 8px 0 12px; letter-spacing: -0.01em; }
    p { color: var(--gray); margin: 0 0 28px; }
    a { display: inline-flex; align-items: center; gap: 8px; font-family: "Poppins", sans-serif; font-size: 15px; letter-spacing: 1.2px; padding: 14px 24px; border-radius: 12px; background: var(--ink); color: var(--cream); text-decoration: none; transition: opacity .2s ease; }
    a:hover { opacity: .85; }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>This page got dressed and left.</h1>
    <p>The page you're looking for isn't here.</p>
    <a href="/">Back to Macgie &rarr;</a>
  </main>
</body>
</html>
